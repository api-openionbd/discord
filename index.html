<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- SEO Meta Tags -->
  <title>Join MMJ Family Discord Server</title>
  <meta name="description" content="Join MMJ Family Discord server. Chat with friends, meet new people, and be part of our growing community.">
  <meta name="keywords" content="discord server, MMJ Family, chat, community, gaming, Bangladesh discord">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #36393f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }

    .card {
      background: #2f3136;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 350px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .server-name {
      font-size: 20px;
      margin: 10px 0;
    }

    .members {
      color: #b9bbbe;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .join-btn {
      background-color: #5865f2;
      border: none;
      padding: 12px 20px;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    .join-btn:hover {
      background-color: #4752c4;
    }

    .description {
      margin-top: 20px;
      max-width: 400px;
      text-align: center;
      color: #b9bbbe;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Discord</div>
    <div class="server-name">MMJ Family</div>
    <div class="members">123 Online • 1,234 Members</div>

    <button class="join-btn" onclick="joinServer()">Join Server</button>
  </div>

  <!-- SEO Content -->
  <div class="description">
    <h1>Join MMJ Family Discord Server</h1>
    <p>
      Welcome to the MMJ Family community! Connect with friends, chat, share ideas,
      and enjoy a fun and active Discord server. Click the button above to join now.
    </p>
  </div>

  <script>
    function joinServer() {
      window.location.href = "https://discord.gg/MGk3t32Xrm";
    }
  </script>

</body>
</html>
